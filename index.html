<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Advanced Current Affairs MCQ</title>
<style>
body { font-family: Arial; background:#eef2f7; padding:20px; }
.question { background:#fff; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.option { padding:8px; margin:6px 0; border:1px solid #ccc; border-radius:6px; cursor:pointer;}
.option:hover { background:#dceeff;}
.correct { background:#c8f7c5 !important;}
.wrong { background:#f7c5c5 !important;}
.result { margin-top:10px; font-weight:bold;}
</style>
</head>
<body>

{

{

],

},

{

options:[

options:[

options:[

],

},

{

{

options:[

{

{
q:`The Artificial Intelligence hub ‘Aikam’ in Telangana signed an MoU with Deakin University to promote:`,
options:[

"Agricultural analytics"
],
answer:2
},

{
q:`Doordarshan, India’s public service broadcaster, was established in which year?`,
options:[

answer:2
},

{
q:`The Indian Council for Cultural Relations (ICCR) was established in:`,
options:[

],

},

{
q:`HUDCO, involved in urban infrastructure financing, was established in:`,

],
answer:1
},

{

options:[

],

},

{

],

},

{
q:`Unified Payments Interface (UPI), a real-time payment system in India, was launched in:`,
options:[

"2015",
"2016",
"2018"
],
answer:2
}

];

const quizDiv = document.getElementById("quiz");

questions.forEach((q, index) => {
let div = document.createElement("div");
div.className = "question";

let html = `<p><b>Q${index+1}. ${q.q}</b></p>`;

q.options.forEach((opt,i)=>{
html += `<div class="option" onclick="checkAnswer(this, ${q.answer})">${opt}</div>`;
});

html += `<div class="result"></div>`;
div.innerHTML = html;
quizDiv.appendChild(div);
});

function checkAnswer(el, correct){
let options = el.parentElement.querySelectorAll(".option");
let result = el.parentElement.querySelector(".result");

options.forEach((opt,i)=>{
opt.onclick=null;
if(i===correct) opt.classList.add("correct");
});

if([...options].indexOf(el)===correct){
el.classList.add("correct");
result.innerHTML="Correct ✅";
}else{
el.classList.add("wrong");
result.innerHTML="Wrong ❌ (Correct answer highlighted)";
}
}

</script>

</body>
</html>
